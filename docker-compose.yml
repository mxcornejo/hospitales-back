services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim-faststart
    container_name: oracle-db
    environment:
      ORACLE_PASSWORD: oracle
      APP_USER: hospital_user
      APP_USER_PASSWORD: hospital123
    ports:
      - "1521:1521"
      - "5500:5500"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./init-db:/container-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 15
      start_period: 120s

  bff:
    build: ./bff
    container_name: bff
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:oracle:thin:@oracle-db:1521/XEPDB1
      DB_USER: hospital_user
      DB_PASS: hospital123
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      AZURE_TENANT_ID: 334d911e-3379-464e-a4fe-83cbd4fcdad3
      AZURE_CLIENT_ID: 765a73b2-5568-41b3-a9a4-2d865745b67c
      MS_PACIENTES_URL: http://ms-pacientes:8081
      MS_SIGNOS_VITALES_URL: http://ms-signos-vitales:8082
      MS_ALERTAS_URL: http://ms-alertas:8083
    depends_on:
      oracle-db:
        condition: service_healthy
    restart: on-failure

  ms-pacientes:
    build: ./ms-pacientes
    container_name: ms-pacientes
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:oracle:thin:@oracle-db:1521/XEPDB1
      DB_USER: hospital_user
      DB_PASS: hospital123
    depends_on:
      oracle-db:
        condition: service_healthy
    restart: on-failure

  ms-signos-vitales:
    build: ./ms-signos-vitales
    container_name: ms-signos-vitales
    ports:
      - "8082:8082"
    environment:
      DB_URL: jdbc:oracle:thin:@oracle-db:1521/XEPDB1
      DB_USER: hospital_user
      DB_PASS: hospital123
    depends_on:
      oracle-db:
        condition: service_healthy
    restart: on-failure

  ms-alertas:
    build: ./ms-alertas
    container_name: ms-alertas
    ports:
      - "8083:8083"
    environment:
      DB_URL: jdbc:oracle:thin:@oracle-db:1521/XEPDB1
      DB_USER: hospital_user
      DB_PASS: hospital123
    depends_on:
      oracle-db:
        condition: service_healthy
    restart: on-failure

volumes:
  oracle-data:
