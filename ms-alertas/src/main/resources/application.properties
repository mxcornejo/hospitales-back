# Server
server.port=8083
spring.application.name=ms-alertas

# Oracle Database
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
spring.datasource.username=${DB_USER:hospital_user}
spring.datasource.password=${DB_PASS:hospital123}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.format_sql=true

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:hospital}
spring.rabbitmq.password=${RABBITMQ_PASS:hospital123}

hospital.rabbit.alertas-exchange=${HOSPITAL_ALERTAS_EXCHANGE:hospital.alertas.exchange}
hospital.rabbit.alertas-db-queue=${HOSPITAL_ALERTAS_DB_QUEUE:hospital.alertas.db.queue}

# Kafka (Sumativa 3)
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092,localhost:9093,localhost:9094}
spring.kafka.consumer.group-id=${KAFKA_ALERTAS_GROUP_ID:ms-alertas-oracle}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=cl.duoc.hospital.alertas.dto.AlertaKafkaMessage
spring.kafka.listener.ack-mode=record
hospital.kafka.topic-alertas=${KAFKA_TOPIC_ALERTAS:alertas}
