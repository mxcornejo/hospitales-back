server.port=8086
spring.application.name=ms-procesador-signos
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092,localhost:9093,localhost:9094}
spring.kafka.consumer.group-id=${KAFKA_PROCESADOR_GROUP_ID:ms-procesador-signos}
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.spring.json.value.default.type=cl.duoc.hospital.procesador.dto.SignoVitalEvent
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
hospital.kafka.topic-signos=${KAFKA_TOPIC_SIGNOS:senales_vitales}
hospital.kafka.topic-alertas=${KAFKA_TOPIC_ALERTAS:alertas}
hospital.threshold.fc-min=${THRESHOLD_FC_MIN:60}
hospital.threshold.fc-max=${THRESHOLD_FC_MAX:100}
hospital.threshold.ps-min=${THRESHOLD_PS_MIN:90}
hospital.threshold.ps-max=${THRESHOLD_PS_MAX:140}
hospital.threshold.pd-min=${THRESHOLD_PD_MIN:60}
hospital.threshold.pd-max=${THRESHOLD_PD_MAX:90}
hospital.threshold.temp-min=${THRESHOLD_TEMP_MIN:35.5}
hospital.threshold.temp-max=${THRESHOLD_TEMP_MAX:38.0}
management.endpoints.web.exposure.include=health,info
