# Server
server.port=8084
spring.application.name=ms-auditoria-json

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:hospital}
spring.rabbitmq.password=${RABBITMQ_PASS:hospital123}

hospital.rabbit.alertas-exchange=${HOSPITAL_ALERTAS_EXCHANGE:hospital.alertas.exchange}
hospital.rabbit.resumenes-exchange=${HOSPITAL_RESUMENES_EXCHANGE:hospital.resumenes.exchange}
hospital.rabbit.alertas-json-queue=${HOSPITAL_ALERTAS_JSON_QUEUE:hospital.alertas.json.queue}
hospital.rabbit.resumenes-json-queue=${HOSPITAL_RESUMENES_JSON_QUEUE:hospital.resumenes.json.queue}

hospital.alertas.output-dir=${HOSPITAL_ALERTAS_OUTPUT_DIR:/var/hospital/output/alertas}
hospital.resumenes.output-dir=${HOSPITAL_RESUMENES_OUTPUT_DIR:/var/hospital/output/resumenes}
