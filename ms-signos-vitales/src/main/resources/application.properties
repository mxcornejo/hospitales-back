# Server
server.port=8082
spring.application.name=ms-signos-vitales

# Oracle Database
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
spring.datasource.username=${DB_USER:hospital_user}
spring.datasource.password=${DB_PASS:hospital123}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.format_sql=true

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:hospital}
spring.rabbitmq.password=${RABBITMQ_PASS:hospital123}

hospital.rabbit.alertas-exchange=${HOSPITAL_ALERTAS_EXCHANGE:hospital.alertas.exchange}
hospital.rabbit.resumenes-exchange=${HOSPITAL_RESUMENES_EXCHANGE:hospital.resumenes.exchange}

# Rangos configurables para detectar anomalías
hospital.thresholds.frecuencia-cardiaca-min=${THRESHOLD_FC_MIN:60}
hospital.thresholds.frecuencia-cardiaca-max=${THRESHOLD_FC_MAX:100}
hospital.thresholds.presion-sistolica-min=${THRESHOLD_PS_MIN:90}
hospital.thresholds.presion-sistolica-max=${THRESHOLD_PS_MAX:140}
hospital.thresholds.saturacion-oxigeno-min=${THRESHOLD_SPO2_MIN:92}
hospital.thresholds.temperatura-max=${THRESHOLD_TEMP_MAX:38}

# Productor 2: resumen periódico de señales vitales
hospital.resumenes.fixed-rate-ms=${RESUMENES_FIXED_RATE_MS:300000}
