# Server
server.port=8080
spring.application.name=bff

# Oracle Database
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
spring.datasource.username=${DB_USER:hospital_user}
spring.datasource.password=${DB_PASS:hospital123}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT Local (usado para el endpoint /api/auth/login)
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=86400000

# Azure Active Directory
# Reemplaza los valores o define las variables de entorno AZURE_TENANT_ID y AZURE_CLIENT_ID
azure.activedirectory.tenant-id=${AZURE_TENANT_ID:your-tenant-id}
azure.activedirectory.client-id=${AZURE_CLIENT_ID:your-client-id}
# Issuer esperado en los tokens de Azure AD v2
azure.activedirectory.issuer-uri=https://login.microsoftonline.com/${AZURE_TENANT_ID:your-tenant-id}/v2.0

# CORS
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}

# Microservices URLs
ms.pacientes.url=${MS_PACIENTES_URL:http://ms-pacientes:8081}
ms.signos-vitales.url=${MS_SIGNOS_VITALES_URL:http://ms-signos-vitales:8082}
ms.alertas.url=${MS_ALERTAS_URL:http://ms-alertas:8083}
